    /* Loading screen elegant */
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1rem;
    }

    #root:empty::before {
      content: '🕊️';
      font-size: 3.5rem;
      animation: rootPulse 2s ease-in-out infinite;
    }

    #root:empty::after {
      content: 'Popas pentru Suflet';
      font-size: 0.9rem;
      opacity: 0.4;
      letter-spacing: 0.05em;
    }

    @keyframes rootPulse {
      0%, 100% { transform: scale(1) translateY(0); opacity: 1; }
      50% { transform: scale(1.08) translateY(-4px); opacity: 0.75; }
    }
  </style>

  <!-- Tema + fontSize instant (fără flash) -->
